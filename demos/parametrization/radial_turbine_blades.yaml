stage:
  # Discretization and plotting
  samples_per_blade: 300


blades:
  stator:
    blade_count: 18

    # Radial outflow: r_out > r_in
    radius_in: 20.0e-3
    radius_out: 30.0e-3

    camberline_type: linear_angle_change
    metal_angle_in_deg: 0.0
    metal_angle_out_deg: +70.0
    maximum_thickness_location: 0.3
    maximum_thickness: 2.0e-3
    leading_edge_radius: 1.0e-3
    trailing_edge_thickness: 0.2e-3
    trailing_edge_wedge_angle_deg: 10.0

  rotor:
    blade_count: 22

    # Rotor starts after the radial gap
    radius_in: 32.0e-3
    radius_out: 42.0e-3

    camberline_type: linear_angle_change
    metal_angle_in_deg: +30.0
    metal_angle_out_deg: -65.0
    maximum_thickness_location: 0.25
    maximum_thickness: 2.5e-3
    leading_edge_radius: 1.5e-3
    trailing_edge_thickness: 0.2e-3
    trailing_edge_wedge_angle_deg: 10.0